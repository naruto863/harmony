services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:9080}
        VITE_ENABLE_DEMO_MOCKS: ${VITE_ENABLE_DEMO_MOCKS:-true}
    container_name: harmony-admin-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
